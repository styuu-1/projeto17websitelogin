<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
</head>

<body>
    <header class="header">
        <nav class="nav">
            <a href="#" class="nav_logo">Lenovo </a>

            <ul class="nav_items">
                <li class="nav_item">
                    <a href="" class="nav_link">Home</a>
                    <a href="" class="nav_link">Produtos</a>
                    <a href="" class="nav_link">Serviços</a>
                    <a href="" class="nav_link">Contatos</a>
                </li>
            </ul>

            <button class="button" id="form-open">Entrar</button>
        </nav>
    </header>

   
    <section class="home">
        <div class="form_container">
            <i class="uil uil-times form_close"></i>


            <div class="form login_form">
                <form action="#">
                    <h2>Login</h2>

                    <div class="input_box">
                        <input type="email" placeholder="Coloque seu E-mail" required />
                        <i class="uil uil-envelope-alt email"></i>
                    </div>

                    <div class="input_box">
                        <input type="password" placeholder="Coloque sua senha" required />
                        <i class="uil uil-lock password"></i>
                        <i class="uil uil-eye-slash pw_hide"></i>
                    </div>
                    <div class="option_field">
                        <span class="checkbox">
                            <input type="checkbox" id="check">
                            <label for="check">Me lembrar</label>
                        </span>
                        <a href="#" class="forgot_pw">Esqueci a senha</a>
                    </div>

                    <button class="button">Entrar agora</button>

                    <div class="login_signup">

                        Não tem uma conta? <a href="#" id="signup">Cadastrar-se</a>
                    </div>
                </form>
            </div>

           

            <div class="form signup_form">
                <form action="#">
                    <h2>Entrar</h2>

                    <div class="input_box">
                        <input type="email" placeholder="Coloque seu E-mail" required />
                        <i class="uil uil-envelope-alt email"></i>
                    </div>

                    <div class="input_box">
                        <input type="password" placeholder="Crie sua senha" required />
                        <i class="uil uil-lock password"></i>
                        <i class="uil uil-eye-slash pw_hide"></i>
                    </div>
                    <div class="input_box">
                        <input type="password" placeholder="Confirme sua senha" required />
                        <i class="uil uil-lock password"></i>
                        <i class="uil uil-eye-slash pw_hide"></i>
                    </div>

                    <button class="button">Se cadastrar agora</button>

                    <div class="login_signup">Já tem uma conta?  <a href="#" id="login">Entrar</a></div>
                </form>
            </div>
        </div>
    </section>

    <script src="js/script.js"></script>
</body>

</html>
